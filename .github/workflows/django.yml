name: Django CI

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./backend
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.12, 3.13, 3.14]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Tests
      run: |
        python manage.py test

  docker-backend-arch:
    if: github.event_name == 'push'
    needs: build
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6
    - name: Resolve image name
      id: image
      shell: bash
      run: |
        echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-backend" >> "${GITHUB_OUTPUT}"
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Resolve image tag
      id: vars
      shell: bash
      run: |
        if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
          BASE_TAG="latest"
        elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          BASE_TAG="${GITHUB_REF#refs/tags/}"
        else
          echo "Unsupported ref for docker publish: ${GITHUB_REF}" >&2
          exit 1
        fi
        echo "base_tag=${BASE_TAG}" >> "${GITHUB_OUTPUT}"
        echo "arch_tag=${BASE_TAG}-${{ matrix.arch }}" >> "${GITHUB_OUTPUT}"
    - name: Build and push backend image
      uses: docker/build-push-action@v7
      with:
        platforms: ${{ matrix.platform }}
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: ${{ steps.image.outputs.name }}:${{ steps.vars.outputs.arch_tag }}

  docker-backend-manifest:
    if: github.event_name == 'push'
    needs: docker-backend-arch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Resolve image name
      id: image
      shell: bash
      run: |
        echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-backend" >> "${GITHUB_OUTPUT}"
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Resolve manifest tag
      id: vars
      shell: bash
      run: |
        if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
          BASE_TAG="latest"
        elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          BASE_TAG="${GITHUB_REF#refs/tags/}"
        else
          echo "Unsupported ref for docker publish: ${GITHUB_REF}" >&2
          exit 1
        fi
        echo "base_tag=${BASE_TAG}" >> "${GITHUB_OUTPUT}"
    - name: Create and push multi-arch manifest
      shell: bash
      run: |
        docker buildx imagetools create \
          --tag "${{ steps.image.outputs.name }}:${{ steps.vars.outputs.base_tag }}" \
          "${{ steps.image.outputs.name }}:${{ steps.vars.outputs.base_tag }}-amd64" \
          "${{ steps.image.outputs.name }}:${{ steps.vars.outputs.base_tag }}-arm64"
