# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./frontend

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        #cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test

  docker-frontend-arch:
    if: github.event_name == 'push'
    needs: build
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6
    - name: Resolve image name
      id: image
      shell: bash
      run: |
        echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-frontend" >> "${GITHUB_OUTPUT}"
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Resolve image tag
      id: vars
      shell: bash
      run: |
        if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
          BASE_TAG="latest"
        elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          BASE_TAG="${GITHUB_REF#refs/tags/}"
        else
          echo "Unsupported ref for docker publish: ${GITHUB_REF}" >&2
          exit 1
        fi
        echo "base_tag=${BASE_TAG}" >> "${GITHUB_OUTPUT}"
        echo "arch_tag=${BASE_TAG}-${{ matrix.arch }}" >> "${GITHUB_OUTPUT}"
    - name: Build and push frontend image
      uses: docker/build-push-action@v7
      with:
        platforms: ${{ matrix.platform }}
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ steps.image.outputs.name }}:${{ steps.vars.outputs.arch_tag }}

  docker-frontend-manifest:
    if: github.event_name == 'push'
    needs: docker-frontend-arch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Resolve image name
      id: image
      shell: bash
      run: |
        echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-frontend" >> "${GITHUB_OUTPUT}"
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Resolve manifest tag
      id: vars
      shell: bash
      run: |
        if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
          BASE_TAG="latest"
        elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          BASE_TAG="${GITHUB_REF#refs/tags/}"
        else
          echo "Unsupported ref for docker publish: ${GITHUB_REF}" >&2
          exit 1
        fi
        echo "base_tag=${BASE_TAG}" >> "${GITHUB_OUTPUT}"
    - name: Create and push multi-arch manifest
      shell: bash
      run: |
        docker buildx imagetools create \
          --tag "${{ steps.image.outputs.name }}:${{ steps.vars.outputs.base_tag }}" \
          "${{ steps.image.outputs.name }}:${{ steps.vars.outputs.base_tag }}-amd64" \
          "${{ steps.image.outputs.name }}:${{ steps.vars.outputs.base_tag }}-arm64"
